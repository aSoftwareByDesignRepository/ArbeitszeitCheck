name: ArbeitszeitCheck Tests

on:
  push:
    paths:
      - "apps/arbeitszeitcheck/**"
      - ".github/workflows/arbeitszeitcheck-tests.yml"
  pull_request:
    paths:
      - "apps/arbeitszeitcheck/**"
      - ".github/workflows/arbeitszeitcheck-tests.yml"

jobs:
  php-tests:
    name: PHP tests (ArbeitszeitCheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/arbeitszeitcheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          coverage: none
          tools: composer

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHP syntax check
        run: composer lint

      - name: Run PHP unit tests
        run: composer test

      - name: Run PHP integration tests
        run: composer test:integration

  js-tests:
    name: JavaScript/Vue tests (ArbeitszeitCheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/arbeitszeitcheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: apps/arbeitszeitcheck/package-lock.json

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run JavaScript unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  accessibility-tests:
    name: Accessibility tests (ArbeitszeitCheck)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/arbeitszeitcheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: apps/arbeitszeitcheck/package-lock.json

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Run accessibility tests
        run: npm run test:a11y
